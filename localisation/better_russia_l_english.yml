l_english:
 br_assimilate_cost_tt:0 "Costs §Y5§! diplomatic power per converted province. Only provinces you can still pay for are converted, so you can never go below 0 diplomatic power."
 br_assimilate_baltic_title:0 "Assimilate the Baltic peoples"
 br_assimilate_baltic_desc:0 "Bring the Baltic peoples into the Slavic fold. Convert every province you own of this culture group to its Slavic counterpart, for 5 diplomatic power per province."
